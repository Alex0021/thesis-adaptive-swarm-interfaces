services:
  workload_inference:
    container_name: workload_inference_service
    build:
      context: ./services/workload_inference
      dockerfile: dockerfile
    volumes:
      - ./services/workload_inference:/app
    ports:
      - 5555:5555
      - 5678:5678
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDEBUG=1
      - IS_DOCKER=1